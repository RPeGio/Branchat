<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + Vue + Typescript App</title>
    <style>
      @font-face {
        font-family: 'exo';
        src: url('./fonts/exo.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: exo, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
      }

      .titlebar {
        height: 32px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
        user-select: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
        position: relative;
        z-index: 1000;
        border-bottom: 1px solid rgba(99, 102, 241, 0.2);
      }

      .titlebar-title {
        max-width: 20rem;
        flex: 1;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        height: 32px;
        user-select: none;
        -webkit-user-select: none;
      }

      .titlebar-favicon {
        max-width: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 8px;
      }

      .titlebar-favicon img {
        max-width: 60%;
        height: auto;
        filter: drop-shadow(0 0 4px rgba(99, 102, 241, 0.4));
      }

      .titlebar-button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 36px;
        height: 32px;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }

      .titlebar-button:hover {
        background: rgba(99, 102, 241, 0.15);
      }

      .titlebar-button img {
        filter: invert(0.7) sepia(0) saturate(0) hue-rotate(0deg);
        opacity: 0.6;
        transition: opacity 0.15s ease;
      }

      .titlebar-button:hover img {
        opacity: 1;
        filter: invert(0.85);
      }

      #titlebar-close:hover {
        background: rgba(239, 68, 68, 0.25);
      }
      #titlebar-close:hover img {
        filter: invert(0.6) sepia(1) saturate(500%) hue-rotate(310deg);
      }

      #app {
        flex: 1;
        overflow: auto;
        scrollbar-width: thin;
        scrollbar-color: #475569 #1e293b;
      }

      #app::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      #app::-webkit-scrollbar-track {
        background: #1e293b;
      }

      #app::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }

      #app::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      #app::-webkit-scrollbar-corner {
        background: #1e293b;
      }
    </style>
  </head>

  <body>
    <div data-tauri-drag-region class="titlebar">
      <div data-tauri-drag-region class="titlebar-title" id="titlebar-title">
        <span class="titlebar-favicon">
          <img src="./src-tauri/icons/favicon.ico" alt="favicon" draggable="false" />
        </span>
      </div>
      <span data-tauri-drag-region id="titlebar-title-text" style="
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        font-weight: 500;
        color: #c7d2fe;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.02em;">Branchat</span>
      <div class="titlebar-buttons">
        <div class="titlebar-button" id="titlebar-minimize">
          <img
            src="https://api.iconify.design/mdi:minimize.svg"
            alt="minimize"
            draggable="false"
          />
        </div>
        <div class="titlebar-button" id="titlebar-maximize">
          <img
            src="https://api.iconify.design/mdi:maximize.svg"
            alt="maximize"
            draggable="false"
          />
        </div>
        <div class="titlebar-button" id="titlebar-close">
          <img
            src="https://api.iconify.design/mdi:close.svg"
            alt="close"
            draggable="false"
          />
        </div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
